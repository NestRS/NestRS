input CreateOrgDto {
	name: String!
}

input CreateUserDto {
	email: String!
	name: String!
}

type Mutation {
	createOrg(input: CreateOrgDto!): Org!
	createUser(input: CreateUserDto!): User!
	deleteOrg(id: String!): Boolean!
	deleteUser(id: String!): Boolean!
	updateOrg(id: String!, input: UpdateOrgDto!): Org
	updateUser(id: String!, input: UpdateUserDto!): User
}

type Org {
	createdAt: String!
	id: String!
	name: String!
	posts: [Post!]!
	updatedAt: String!
	users: [User!]!
}

type Post {
	author: User
	authorId: String!
	body: String!
	createdAt: String!
	id: String!
	org: Org
	orgId: String!
	title: String!
	updatedAt: String!
}

type Query {
	org(id: String!): Org
	orgs(after: String, first: Int): [Org!]!
	user(id: String!): User
	users(after: String, first: Int): [User!]!
}

input UpdateOrgDto {
	name: String!
}

input UpdateUserDto {
	email: String!
	name: String!
}

type User {
	createdAt: String!
	email: String!
	id: String!
	name: String!
	org: Org
	orgId: String!
	posts: [Post!]!
	updatedAt: String!
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
schema {
	query: Query
	mutation: Mutation
}
